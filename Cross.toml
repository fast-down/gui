[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:edge"
pre-build = [
  "apt-get update",
  "apt-get install -y clang pkg-config libfontconfig1-dev libfreetype6-dev libgtk-3-dev libglib2.0-dev libxdo-dev libayatana-appindicator3-dev"
]

[target.i686-unknown-linux-gnu]
image = "ghcr.io/cross-rs/i686-unknown-linux-gnu:edge"
pre-build = [
  "echo 'deb [trusted=yes] http://deb.debian.org/debian bullseye main' >> /etc/apt/sources.list",
  "dpkg --add-architecture i386 && apt-get update",
  "apt-get install -y clang pkg-config:i386 libfontconfig1-dev:i386 libfreetype6-dev:i386 libgtk-3-dev:i386 libglib2.0-dev:i386 libxdo-dev:i386 libayatana-appindicator3-dev:i386"
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"
pre-build = [
  "dpkg --add-architecture arm64 && apt-get update",
  "apt-get install -y clang pkg-config:arm64 libfontconfig1-dev:arm64 libfreetype6-dev:arm64 libgtk-3-dev:arm64 libglib2.0-dev:arm64 libxdo-dev:arm64 libayatana-appindicator3-dev:arm64"
]

[build.env]
passthrough = ["CC=clang", "CXX=clang++"]
