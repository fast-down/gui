name: Test

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-nightly"
          add-job-id-key: "false"
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - name: Install Slint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-composite0-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev
      - name: Run Clippy
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo hack clippy --feature-powerset

  test:
    name: Test (${{ matrix.os }} - ${{ matrix.channel }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        channel: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.channel }}
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}-${{ matrix.channel }}"
          add-job-id-key: "false"
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - name: Install Slint dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-composite0-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev
      - name: Run Tests
        run: cargo hack test --feature-powerset --depth 1 --verbose

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable"
          add-job-id-key: "false"
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Install Slint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-composite0-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev
      - name: Run Deny
        run: cargo deny --all-features check

  udeps:
    name: Unused Deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-nightly"
          add-job-id-key: "false"
          cache-on-failure: "true"
          cache-all-crates: "true"
          cache-workspace-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      - name: Install cargo-hack & cargo-udeps
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack,cargo-udeps
      - name: Install Slint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-composite0-dev \
            libxcb-cursor-dev \
            libxcb-xkb-dev \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev
      - name: Run Udeps
        run: cargo hack udeps --feature-powerset
